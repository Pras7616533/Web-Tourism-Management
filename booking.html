<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Book Your Tour</title>

<style>
  @import url("https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Source+Sans+3:wght@400;500;600&display=swap");

  :root {
    --ink: #111827;
    --muted: #5f6b7a;
    --accent: #1c7ed6;
    --accent-dark: #155fa2;
    --surface: #ffffff;
    --border: #e3e8ef;
    --shadow: 0 22px 45px rgba(17, 24, 39, 0.15);
    --bg-top: #0f2634;
    --bg-bottom: #eef2f6;
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    font-family: "Source Sans 3", "Segoe UI", sans-serif;
    background: linear-gradient(180deg, var(--bg-top) 0%, #1a3b4e 40%, var(--bg-bottom) 100%);
    color: var(--ink);
    min-height: 100vh;
  }

  header {
    color: white;
    padding: 26px 16px 36px;
    text-align: center;
    background: radial-gradient(circle at top, rgba(255, 255, 255, 0.16), transparent 60%);
  }

  header h1 {
    margin: 0;
    font-family: "Outfit", sans-serif;
    font-weight: 700;
    letter-spacing: 0.6px;
    font-size: 30px;
  }

  section {
    max-width: 640px;
    background: var(--surface);
    padding: 24px;
    margin: -20px auto 32px;
    border-radius: 16px;
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
  }

  input, select, button {
    width: 100%;
    padding: 12px 14px;
    margin: 8px 0;
    font-size: 16px;
    border-radius: 12px;
  }

  input, select {
    border: 1px solid var(--border);
    background: #f8fafc;
    color: var(--ink);
  }

  input:focus, select:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 2px rgba(28, 126, 214, 0.18);
  }

  button {
    background: var(--accent);
    color: white;
    border: none;
    cursor: pointer;
    font-weight: 600;
    transition: transform 0.15s ease, background 0.15s ease;
  }

  button:hover {
    background: var(--accent-dark);
    transform: translateY(-1px);
  }

  #packageImage {
    width: 100%;
    max-width: 600px;
    aspect-ratio: 16 / 9;
    margin: 10px auto 18px;
    display: block;
    border-radius: 14px;
    box-shadow: 0 12px 24px rgba(17, 24, 39, 0.15);
    background: #e7edf5;
    object-fit: cover;
  }

  #result {
    margin-top: 10px;
    color: var(--muted);
  }
</style>
</head>

<body>

<header>
  <h1>Book Your Tour</h1>
</header>

<section>

  <img id="packageImage">

  <form onsubmit="goToBookingDetails(event)">

    <input type="text" id="name" placeholder="Your Name" required>

    <input type="email" id="email" placeholder="Your Email" required>

    <select id="hotel" required>
      <option value="">Select Hotel</option>
    </select>

    <button type="submit">Confirm Booking</button>

  </form>

  <div id="result"></div>

</section>

<script>
const hotels = {
  Goa: ["Taj Goa", "Sea View Resort"],
  Manali: ["Snow Valley Hotel", "Mountain Inn"],
  Delhi: ["The Oberoi", "Taj Palace"],
  Dubai: ["Burj Al Arab", "Atlantis Hotel"],
  Paris: ["Louvre Stay", "Pullman Hotel"],
  "New Zealand": ["Lake View Lodge", "Kiwi Resort"]
};

const images = {
  Goa: "images/goa.jpg",
  Manali: "images/manali.jpg",
  Delhi: "images/delhi.jpg",
  Dubai: "images/dubai.jpg",
  Paris: "images/paris.jpg",
  "New Zealand": "images/newzealand.jpg"
};

const fallbackImage = "images/banner.jpg";

function goToBookingDetails(e) {
  e.preventDefault(); // Default form submit rok do

  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const hotel = document.getElementById("hotel").value;

  // Redirect with URL params
  const params = new URLSearchParams();
  params.set("name", name);
  params.set("email", email);
  params.set("hotel", hotel);
  params.set("package", selectedPackage); // selectedPackage tumhare code me already defined hai

  window.location.href = "booking-details.html?" + params.toString();
}

const params = new URLSearchParams(window.location.search);
const selectedPackage = params.get("package");

if(selectedPackage) {

  const packageImage = document.getElementById("packageImage");
  packageImage.src = images[selectedPackage];
  packageImage.addEventListener("error", () => {
    packageImage.src = fallbackImage;
  });

  const hotelDropdown = document.getElementById("hotel");

  hotels[selectedPackage].forEach(hotel => {
    const option = document.createElement("option");
    option.value = hotel;
    option.textContent = hotel;
    hotelDropdown.appendChild(option);
  });
}

function confirmBooking(e) {
  e.preventDefault();

  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const hotel = document.getElementById("hotel").value;

  document.getElementById("result").innerHTML =
  `<h3>Booking Confirmed!</h3>
   <p>Name: ${name}</p>
   <p>Email: ${email}</p>
   <p>Package: ${selectedPackage}</p>
   <p>Hotel: ${hotel}</p>`;
}
</script>

</body>
</html>
